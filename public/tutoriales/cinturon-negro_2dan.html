<script>window.BELT = {"name":"Negro","grade":"2° Dan","icon":"段","tip":false,"subtitle":"Toda la materia del examen de <strong>2° Dan</strong>: los tres tules del segundo grado, combate, defensa personal, rotura y teoría. Cada técnica con su nombre coreano y su explicación.","quick":[{"b":"II","s":"Dan · 2°"},{"b":"<span class=\"kr\">의암</span>","s":"Tul Eui-Am"},{"b":142,"s":"Movimientos"},{"b":3,"s":"Tuls nuevos"}],"introTitle":"Tu examen de 2° Dan","intro":"Como cinturón negro de <strong>2° Dan</strong> profundizas en el dominio técnico y comienzas tu camino como guía: el II Dan puede actuar como <strong>instructor asistente</strong>. Debes ejecutar <strong>tres tules nuevos</strong> y demostrar el control de toda la materia anterior.","fundamentos":[{"name":"Nopunde Bandae Dollyo Chagi","es":"Patada circular inversa a la zona alta (con giro del cuerpo)."},{"name":"Gunnun So Sonkal Najunde Bandae Anuro Makgi","es":"Posición caminando y defensa baja inversa hacia adentro con el canto de la mano."},{"name":"Gunnun So Kyocha Joomuk Naeryo Makgi","es":"Posición caminando y defensa descendente con los puños cruzados (en X)."},{"name":"Gunnun So Nopunde Bandae Bandal Jirugi","es":"Posición caminando y golpe alto en media luna."},{"name":"Gunnun So Sonkal Dung Dollimyo Makgi","es":"Posición caminando y defensa circular con el reverso del canto de la mano."},{"name":"Dwitbal So Euhkallin Sonbadak Naeryo Makgi","es":"Posición pie atrás y defensa descendente con las palmas cruzadas."},{"name":"Moorup Najunde Apcha Busigi","es":"Patada frontal baja con la rodilla."},{"name":"Gunnun So Doo Songarak Nopunde Bandae Tulgi","es":"Posición caminando y ataque alto inverso con los dos dedos."},{"name":"Gunnun So Sang Sonkal Soopyong Taerigi","es":"Posición caminando y golpe horizontal con el doble canto de la mano."},{"name":"Gunnun So Pyon Joomuk Nopunde Bandae Jirugi","es":"Posición caminando y golpe alto inverso con el puño plano."},{"name":"Dwitbal So Sang Sonbadak Noollo Makgi","es":"Posición pie atrás y defensa de presión con la doble palma."},{"name":"Kaunde Golcho Chagi","es":"Patada de gancho a la zona media."},{"name":"Sonkal Twio Dolmyo Taerigi","es":"Golpe con el canto de la mano en salto y giro, en el aire."},{"name":"Gokaeng-i Chagi","es":"Patada en forma de pico."},{"name":"Twimyo Sangbang Chagi","es":"Patada doble en salto, hacia dos direcciones."},{"name":"Gunnun So Sang Sonkal Nopunde Anuro Taerigi","es":"Posición caminando y golpe alto hacia adentro con el doble canto de la mano."}],"fundamentosLead":"Estas son las técnicas <strong>nuevas</strong> que debutan en los tules de II Dan (Eui-Am, Choong-Jang y Juche), según el estándar ITF. En el examen también se evalúa el dominio de todas las técnicas de los grados anteriores.","fundamentosPrev":"Más todas las técnicas fundamentales de los grados de color y de I Dan.","tuls":[{"kr":"의암","name":"Eui-Am","mean":"Son Byong Hi","moves":45,"desc":"Seudónimo de Son Byong Hi, líder del movimiento de independencia coreano del 1 de marzo de 1919. Los 45 movimientos se refieren a su edad cuando cambió el nombre de Dong Hak (Cultura Oriental) por Chondo Kyo (Religión del Camino Celestial) en 1905. El diagrama representa su espíritu indomable."},{"kr":"충장","name":"Choong-Jang","mean":"General Kim Duk Ryang","moves":52,"desc":"Seudónimo del general Kim Duk Ryang, que vivió durante la dinastía Lee, en el siglo XIV. El tul termina con un ataque de mano izquierda para simbolizar la tragedia de su muerte a los 27 años en prisión, antes de alcanzar la madurez."},{"kr":"주체","name":"Juche","mean":"Idea filosófica Juche","moves":45,"desc":"Idea filosófica de que el hombre es el dueño de todo y decide todo; es decir, que el hombre es el dueño del mundo. Se dice que esta idea tiene su raíz en el monte Baekdu, que simboliza el espíritu del pueblo coreano."}],"tulLead":"Un <span class=\"term\">tul <span class=\"kr\">(틀)</span></span> es una forma: una secuencia fija de ataque y defensa contra adversarios imaginarios. En este grado presentas los <strong>tres tules</strong> de tu nivel con precisión, potencia y la onda sinusoidal correcta.","tulKeys":[{"b":"<span class=\"kr\">의암</span>","s":"Eui-Am · 45"},{"b":"<span class=\"kr\">충장</span>","s":"Choong-Jang · 52"},{"b":"<span class=\"kr\">주체</span>","s":"Juche · 45"},{"b":3,"s":"Tuls en el examen"}],"tulCheck":["Ejecución correcta de la onda sinusoidal en cada movimiento.","Precisión del diagrama: empezar y terminar en el mismo punto.","Equilibrio, exactitud y profundidad de cada posición.","Ritmo, potencia y control de la respiración.","Conocer el significado y el número de movimientos de cada tul.","Dominio de los tules de I Dan y de los grados de color."],"combate":[{"t":"Jayu Matsogi","s":"Combate libre."},{"t":"Ban Jayu Matsogi","s":"Combate semilibre."},{"t":"Model Matsogi","s":"Combate de modelo (pre-arreglado)."},{"t":"Combate contra dos oponentes","s":""}],"combateLead":"Modalidades de combate que debes demostrar dominando ambos lados por igual.","defensa":[{"t":"Liberación de agarres por la espalda","s":"Y estrangulamientos."},{"t":"Defensa contra puño, patada y agarre","s":""},{"t":"Defensa contra dos atacantes","s":""},{"t":"Aplicación de puntos vitales","s":""}],"rotura":[{"t":"Rotura de potencia","s":"Mayor número de tablas que en I Dan."},{"t":"Técnica especial","s":"Patada en salto en altura o con giro."},{"t":"Rotura de elección","s":"Distinta a las anteriores."}],"teoria":[{"q":"SIGNIFICADO Y MOVIMIENTOS DE LOS TULES DE II DAN","p":"Eui-Am (45 mov.), Choong-Jang (52 mov.) y Juche (45 mov.). Debes saber a quién o a qué idea representa cada tul y por qué tiene ese número de movimientos."},{"q":"LOS SECRETOS DEL ENTRENAMIENTO","p":"Estudiar la teoría detrás de cada técnica, comprender el propósito de cada movimiento, llevar el ritmo y la respiración, y elevar y bajar el cuerpo con la onda sinusoidal."},{"q":"EL JURAMENTO DEL TAEKWON-DO","p":"Observaré los principios del Taekwon-Do; respetaré a mis instructores y mayores; nunca haré mal uso del Taekwon-Do; defenderé la libertad y la justicia; y construiré un mundo más pacífico."},{"q":"DIFERENCIA ENTRE I, II Y III DAN","p":"El I Dan no es considerado instructor; el II y el III Dan solo pueden tener estatus de instructor asistente."},{"q":"PUNTOS VITALES (KUPSO)","p":"Zonas del cuerpo sensibles al ataque y la defensa. Su conocimiento permite aplicar la técnica con mayor eficacia y control."},{"q":"EL SIGNIFICADO DEL DO","p":"El «Do» es el camino: la dimensión moral y filosófica del Taekwon-Do que busca la formación integral de la persona, más allá de la técnica."}],"recordarIcon":"段","recordar":"Los tres tules de II Dan, <span class=\"term\">Eui-Am</span>, <span class=\"term\">Choong-Jang</span> y <span class=\"term\">Juche</span>, suman <strong>142 movimientos</strong> y hablan de espíritu indomable, lealtad y autodeterminación. Como II Dan empiezas a guiar a otros como instructor asistente: el ejemplo es ahora parte de tu técnica. Practica con técnica, potencia y respeto."};</script>
