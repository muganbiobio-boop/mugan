<script>window.BELT = {"name":"Negro","grade":"1° Dan","icon":"段","tip":false,"subtitle":"Toda la materia del examen de <strong>1° Dan</strong>: los tres tules de cinturón negro, combate, defensa personal, rotura y teoría. Cada técnica con su nombre coreano y su explicación.","quick":[{"b":"I","s":"Dan · 1°"},{"b":"<span class=\"kr\">광개</span>","s":"Tul Kwang-Gae"},{"b":119,"s":"Movimientos"},{"b":3,"s":"Tuls nuevos"}],"introTitle":"Tu examen de 1° Dan","intro":"El cinturón <strong>negro</strong> marca el verdadero comienzo del Taekwon-Do. Ya no se evalúa una sola forma: debes dominar <strong>tres tules nuevos</strong> y demostrar el control de toda la materia de los grados de color. El negro es lo opuesto al blanco: simboliza la madurez y la firmeza ante el miedo y la oscuridad.","fundamentos":[{"name":"Gunnun So Dwijibo Jirugi","es":"Posición caminando y golpe con el puño invertido, ejecutado en cámara lenta."},{"name":"Gunnun So Sonbadak Golcho Makgi","es":"Posición caminando y defensa de gancho alta con la palma de la mano."},{"name":"Nachuo So Sonbadak Noollo Makgi","es":"Posición baja y defensa de presión con la palma de la mano."},{"name":"Dwitbal So Sonkal Nopunde Daebi Makgi","es":"Posición pie atrás y defensa de guardia alta con el canto de la mano."},{"name":"Bakuro Noollo Chagi","es":"Patada de presión hacia afuera con la planta del pie."},{"name":"Annun So Kiokja Jirugi","es":"Posición jinete y golpe en ángulo (forma «ㄱ»)."},{"name":"Annun So Soopyong Jirugi","es":"Posición jinete y golpe horizontal."},{"name":"Annun So Dwit Palkup Tulgi","es":"Posición jinete y ataque con el codo hacia atrás."},{"name":"Annun So An Palmok Kaunde Hechyo Makgi","es":"Posición jinete y defensa media en cuña con el antebrazo interno."},{"name":"Niunja So Digutja Japgi","es":"Posición L y agarre en forma de «ㄷ»."},{"name":"Waebal Sogi","es":"Posición de equilibrio sobre una sola pierna."},{"name":"Najunde Bituro Chagi","es":"Patada baja torcida, con giro del pie."},{"name":"Annun So Sonbadak Duro Makgi","es":"Posición jinete y defensa de recogida con la palma de la mano."},{"name":"Annun So Gutja Makgi","es":"Posición jinete y defensa en forma de «9»."},{"name":"Twimyo Kyocha So Doo Palmok Nopunde Makgi","es":"Defensa alta con el doble antebrazo en salto, formando posición en X."},{"name":"Gunnun So Doo Bandalson Nopunde Makgi","es":"Posición caminando y defensa alta con doble mano en media luna."},{"name":"Niunja So Joongji Joomuk Kaunde Jirugi","es":"Posición L y golpe medio con el puño del nudillo medio."}],"fundamentosLead":"Estas son las técnicas <strong>nuevas</strong> que debutan en los tules de I Dan (Kwang-Gae, Po-Eun y Ge-Baek), según el estándar ITF. En el examen también se evalúa el dominio de todas las técnicas fundamentales de los grados anteriores.","fundamentosPrev":"Más todas las técnicas fundamentales de los cinturones de color y de los grados anteriores.","tuls":[{"kr":"광개","name":"Kwang-Gae","mean":"Rey Kwang-Gae-Toh-Wang","moves":39,"desc":"Nombre del famoso Kwang-Gae-Toh-Wang, 19° rey de la dinastía Koguryo, que recuperó los territorios perdidos, incluida gran parte de Manchuria. Los 39 movimientos se refieren a las dos primeras cifras del año 391 d.C., cuando subió al trono."},{"kr":"포은","name":"Po-Eun","mean":"Chong Mong-Chu","moves":36,"desc":"Seudónimo del leal Chong Mong-Chu (1400), célebre poeta cuyo verso «no serviría a un segundo amo aunque me crucificaran cien veces» conoce todo coreano. El diagrama representa su inquebrantable lealtad al rey y al país al final de la dinastía Koryo."},{"kr":"계백","name":"Ge-Baek","mean":"General Ge-Baek","moves":44,"desc":"Nombre del general Ge-Baek, gran general de la dinastía Baek-Je (660 d.C.). El diagrama representa su severa y estricta disciplina militar."}],"tulLead":"Un <span class=\"term\">tul <span class=\"kr\">(틀)</span></span> es una forma: una secuencia fija de ataque y defensa contra adversarios imaginarios. Como cinturón negro ya no presentas un solo tul: debes ejecutar los <strong>tres tules</strong> de tu grado con precisión, potencia y la onda sinusoidal correcta.","tulKeys":[{"b":"<span class=\"kr\">광개</span>","s":"Kwang-Gae · 39"},{"b":"<span class=\"kr\">포은</span>","s":"Po-Eun · 36"},{"b":"<span class=\"kr\">계백</span>","s":"Ge-Baek · 44"},{"b":3,"s":"Tuls en el examen"}],"tulCheck":["Ejecución correcta de la onda sinusoidal: subir, bajar y subir en cada movimiento.","Precisión del diagrama: empezar y terminar exactamente en el mismo punto.","Equilibrio y exactitud de cada posición.","Ritmo, potencia y control de la respiración.","Conocer el significado y el número de movimientos de cada tul.","Dominio de todos los tules de los grados anteriores."],"combate":[{"t":"Jayu Matsogi","s":"Combate libre."},{"t":"Ban Jayu Matsogi","s":"Combate semilibre."},{"t":"Ilbo Matsogi","s":"Combate a un paso: selección propia de técnicas, incluidas esquivas."}],"combateLead":"Modalidades de combate que debes demostrar dominando ambos lados por igual.","defensa":[{"t":"Liberación de agarres","s":"Muñeca, ropa y antebrazo."},{"t":"Defensa contra ataques de puño y patada","s":""},{"t":"Aplicación de puntos vitales","s":"Sobre las técnicas de agarre y ataque."}],"rotura":[{"t":"Rotura de potencia","s":"Técnica de mano o pie a elección (Wesryo Kyukpa)."},{"t":"Técnica especial","s":"Patada en salto (Twigi Kyukpa)."},{"t":"Cantidad de tablas","s":"Según la categoría e indicación del examinador."}],"teoria":[{"q":"SIGNIFICADO Y MOVIMIENTOS DE LOS TULES DE I DAN","p":"Kwang-Gae (39 mov.), Po-Eun (36 mov.) y Ge-Baek (44 mov.). Debes saber a quién representa cada tul y por qué tiene ese número de movimientos."},{"q":"TEORÍA DEL PODER","p":"Se compone de seis elementos: fuerza de reacción, concentración, equilibrio, control de la respiración, masa y velocidad."},{"q":"LA ONDA SINUSOIDAL","p":"El cuerpo sube y baja como una onda (arriba-abajo-arriba) para sumar la masa y la gravedad a cada técnica y generar más potencia."},{"q":"LOS PRINCIPIOS DEL TAEKWON-DO","p":"Cortesía, Integridad, Perseverancia, Autocontrol y Espíritu indomable. Son la guía de conducta del practicante."},{"q":"SIGNIFICADO DEL CINTURÓN NEGRO","p":"Es lo opuesto al blanco: representa la madurez y la competencia en el Taekwon-Do, además de la indiferencia del portador ante el miedo y la oscuridad."},{"q":"COMPOSICIÓN DEL TAEKWON-DO","p":"Técnica fundamental, tul, combate y rotura, junto con la preparación física y la teoría."}],"recordarIcon":"段","recordar":"Los tres tules de I Dan, <span class=\"term\">Kwang-Gae</span>, <span class=\"term\">Po-Eun</span> y <span class=\"term\">Ge-Baek</span>, suman <strong>119 movimientos</strong> y hablan de reconquista, lealtad y disciplina. El cinturón negro es lo opuesto al blanco: representa la madurez en el Taekwon-Do y la firmeza ante el miedo y la oscuridad. Practica con técnica, potencia y respeto."};</script>
