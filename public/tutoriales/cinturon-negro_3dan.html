<script>window.BELT = {"name":"Negro","grade":"3° Dan","icon":"段","tip":false,"subtitle":"Toda la materia del examen de <strong>3° Dan</strong>: los tres tules del tercer grado, combate, defensa personal, rotura y teoría. Cada técnica con su nombre coreano y su explicación.","quick":[{"b":"III","s":"Dan · 3°"},{"b":"<span class=\"kr\">삼일</span>","s":"Tul Sam-Il"},{"b":147,"s":"Movimientos"},{"b":3,"s":"Tuls nuevos"}],"introTitle":"Tu examen de 3° Dan","intro":"El <strong>3° Dan</strong> es un grado de madurez técnica y de liderazgo: el III Dan puede actuar como <strong>instructor asistente</strong> y se le exige profundidad en la teoría y la enseñanza. Debes ejecutar <strong>tres tules nuevos</strong> —entre ellos el extenso Yoo-Sin— y dominar toda la materia anterior.","fundamentos":[{"name":"Kaunde Bituro Chagi","es":"Patada torcida, con giro del pie, a la zona media."},{"name":"Suroh Chagi","es":"Patada de barrido."},{"name":"Annun So Sonkal Dung Kaunde Hechyo Makgi","es":"Posición jinete y defensa media en cuña con el reverso del canto de la mano."},{"name":"Gunnun So Sonkal Bandae Nopunde Yop Makgi","es":"Posición caminando y defensa lateral alta inversa con el canto de la mano."},{"name":"Niunja So Doo Joomuk Najunde Jirugi","es":"Posición L y golpe bajo con el doble puño."},{"name":"Sasun So Dwit Palkup Tulgi","es":"Posición diagonal y ataque con el codo hacia atrás."},{"name":"Doro Chagi","es":"Patada ondulante."},{"name":"Kaunde Bandal Chagi","es":"Patada en media luna a la zona media."},{"name":"Annun So Baegi","es":"Posición jinete y movimiento de liberación de un agarre."},{"name":"Gojung So Digutja Jirugi","es":"Posición fija y golpe en forma de «ㄷ» (U)."},{"name":"Gunnun So Kyocha Sonkal Chukyo Makgi","es":"Posición caminando y defensa ascendente con los cantos de la mano cruzados."},{"name":"Soojik So Yop Joomuk Bandae Naeryo Taerigi","es":"Posición vertical y golpe descendente inverso con el puño lateral."},{"name":"Gunnun So Sonkal San Makgi","es":"Posición caminando y defensa en forma de montaña (W) con el canto de la mano."},{"name":"Narani So Sonbadak Kaunde Golcho Makgi","es":"Posición paralela y defensa media de gancho con la palma de la mano."},{"name":"Dwitbal So Joongji Joomuk Nopunde Jirugi","es":"Posición pie atrás y golpe alto con el puño del nudillo medio."}],"fundamentosLead":"Estas son las técnicas <strong>nuevas</strong> que debutan en los tules de III Dan (Sam-Il, Yoo-Sin y Choi-Yong), según el estándar ITF. En el examen también se evalúa el dominio de todas las técnicas de los grados anteriores.","fundamentosPrev":"Más todas las técnicas fundamentales de los grados de color, I Dan y II Dan.","tuls":[{"kr":"삼일","name":"Sam-Il","mean":"Movimiento del 1 de marzo","moves":33,"desc":"Denota la fecha histórica del movimiento de independencia de Corea, que se inició en todo el país el 1 de marzo (Sam-Il) de 1919. Los 33 movimientos representan a los 33 patriotas que planearon el movimiento."},{"kr":"유신","name":"Yoo-Sin","mean":"General Kim Yoo Sin","moves":68,"desc":"Nombre del general Kim Yoo Sin, comandante durante la dinastía Silla. Los 68 movimientos se refieren a las dos últimas cifras del año 668 d.C., cuando Corea fue unificada. La posición de preparación —espada desenvainada al lado derecho en vez del izquierdo— recuerda el error de Yoo Sin al obedecer a su rey y combatir contra su propio pueblo."},{"kr":"최영","name":"Choi-Yong","mean":"General Choi Yong","moves":46,"desc":"Nombre del general Choi Yong, primer ministro y comandante en jefe de las fuerzas armadas durante la dinastía Koryo, en el siglo XIV. Respetado por su lealtad, patriotismo y humildad, fue ejecutado por sus comandantes subordinados, encabezados por Yi Sung Gae, quien más tarde fue el primer rey de la dinastía Lee."}],"tulLead":"Un <span class=\"term\">tul <span class=\"kr\">(틀)</span></span> es una forma: una secuencia fija de ataque y defensa contra adversarios imaginarios. En este grado presentas los <strong>tres tules</strong> de tu nivel, incluido el extenso Yoo-Sin de 68 movimientos, con precisión, potencia y la onda sinusoidal correcta.","tulKeys":[{"b":"<span class=\"kr\">삼일</span>","s":"Sam-Il · 33"},{"b":"<span class=\"kr\">유신</span>","s":"Yoo-Sin · 68"},{"b":"<span class=\"kr\">최영</span>","s":"Choi-Yong · 46"},{"b":3,"s":"Tuls en el examen"}],"tulCheck":["Ejecución correcta de la onda sinusoidal en cada movimiento.","Precisión del diagrama: empezar y terminar en el mismo punto.","Equilibrio, exactitud y profundidad de cada posición.","Ritmo, potencia, fluidez y control de la respiración en formas largas.","Conocer el significado y el número de movimientos de cada tul.","Dominio de todos los tules de los grados anteriores."],"combate":[{"t":"Jayu Matsogi","s":"Combate libre."},{"t":"Model Matsogi","s":"Combate de modelo avanzado."},{"t":"Combate contra varios oponentes","s":""},{"t":"Ilbo / Ibo Matsogi","s":"Selección propia, ambos lados."}],"combateLead":"Modalidades de combate que debes demostrar dominando ambos lados por igual.","defensa":[{"t":"Defensa contra arma","s":"Cuchillo y palo."},{"t":"Defensa contra múltiples atacantes","s":"No pre-arreglada."},{"t":"Liberaciones y proyecciones","s":""},{"t":"Aplicación avanzada de puntos vitales","s":""}],"rotura":[{"t":"Rotura de potencia","s":"Alta dificultad y mayor número de tablas."},{"t":"Técnica especial","s":"Patada en salto y giro de máxima dificultad."},{"t":"Rotura de elección propia","s":"Se valora el grado de dificultad."}],"teoria":[{"q":"SIGNIFICADO Y MOVIMIENTOS DE LOS TULES DE III DAN","p":"Sam-Il (33 mov.), Yoo-Sin (68 mov.) y Choi-Yong (46 mov.). Debes saber a quién o a qué hecho representa cada tul y por qué tiene ese número de movimientos."},{"q":"FILOSOFÍA DEL TAEKWON-DO (EL DO)","p":"El Taekwon-Do es un camino de formación moral: busca la justicia, la cortesía y el espíritu indomable, no solo la eficacia en el combate."},{"q":"HISTORIA DEL TAEKWON-DO Y EL GENERAL CHOI","p":"El General Choi Hong Hi (1918–2002) fundó el Taekwon-Do y, en 1966, la Federación Internacional (ITF). El sistema de tules Chang-Hon lleva su seudónimo."},{"q":"COMPOSICIÓN Y PRINCIPIOS DEL TAEKWON-DO","p":"Técnica fundamental, tul, combate y rotura, sostenidos por los cinco principios: cortesía, integridad, perseverancia, autocontrol y espíritu indomable."},{"q":"METODOLOGÍA DE LA ENSEÑANZA","p":"Como III Dan puedes ser instructor asistente: debes saber corregir, demostrar y explicar la técnica y la teoría a alumnos de grados inferiores."},{"q":"TEORÍA DEL PODER Y ONDA SINUSOIDAL","p":"Repaso avanzado: los seis elementos del poder y el movimiento de onda como fuente de potencia en toda técnica."}],"recordarIcon":"段","recordar":"Los tres tules de III Dan, <span class=\"term\">Sam-Il</span>, <span class=\"term\">Yoo-Sin</span> y <span class=\"term\">Choi-Yong</span>, suman <strong>147 movimientos</strong> y hablan de independencia, unificación y lealtad. En este grado tu técnica se vuelve enseñanza: lo que demuestras, otros lo aprenden. Practica con técnica, potencia y respeto."};</script>
